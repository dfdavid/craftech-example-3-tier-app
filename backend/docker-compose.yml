version: '3.8'

services:
  backend:
    build: .
    image: backend
    container_name: backend
    env_file:
      - .env
    ports:
      - 8000:8000

  db:
    container_name: database
    image: postgres:12.0-alpine
    env_file: ./.env.postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - 5432:5432

volumes:
  postgres_data:
  static:
  media:

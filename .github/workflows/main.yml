name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:latest
          build-args: |
            REACT_APP_API_SERVER=${{ secrets.REACT_APP_API_SERVER }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Proxy
        uses: docker/build-push-action@v5
        with:
          context: ./reverse-proxy
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/proxy:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Verify Environment Variables (Debug)
        run: |
          echo "Verificando presencia de variables criticas..."
          [ -z "${{ secrets.SECRET_KEY }}" ] && echo "SECRET_KEY: MISSING" || echo "SECRET_KEY: OK"
          [ -z "${{ secrets.SQL_USER }}" ] && echo "SQL_USER: MISSING" || echo "SQL_USER: OK"
          [ -z "${{ secrets.SQL_PASSWORD }}" ] && echo "SQL_PASSWORD: MISSING" || echo "SQL_PASSWORD: OK"
          [ -z "${{ secrets.NGINX_CERT_CONTENT }}" ] && echo "NGINX_CERT_CONTENT: MISSING" || echo "NGINX_CERT_CONTENT: OK"

      - name: Deploy with Docker Compose
        env:
          # Nginx Proxy
          NGINX_FQDN: ${{ secrets.NGINX_FQDN }}
          NGINX_CERT: ${{ secrets.NGINX_CERT || 'certificado.crt' }}
          NGINX_KEY: ${{ secrets.NGINX_KEY || 'clave_privada.key' }}
          NGINX_CERT_CONTENT: ${{ secrets.NGINX_CERT_CONTENT }}
          NGINX_KEY_CONTENT: ${{ secrets.NGINX_KEY_CONTENT }}
          # Frontend
          REACT_APP_API_SERVER: ${{ secrets.REACT_APP_API_SERVER }}
          # Backend
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DEBUG: ${{ secrets.DEBUG || '0' }}
          DJANGO_ALLOWED_HOSTS: ${{ secrets.DJANGO_ALLOWED_HOSTS || '*' }}
          CORS_ALLOWED_ORIGINS: ${{ secrets.CORS_ALLOWED_ORIGINS }}
          CSRF_TRUSTED_ORIGINS: ${{ secrets.CSRF_TRUSTED_ORIGINS }}
          # Database
          DATABASE: ${{ secrets.DATABASE || 'postgres' }}
          SQL_ENGINE: ${{ secrets.SQL_ENGINE || 'django.db.backends.postgresql' }}
          SQL_DATABASE: ${{ secrets.SQL_DATABASE }}
          SQL_USER: ${{ secrets.SQL_USER }}
          SQL_PASSWORD: ${{ secrets.SQL_PASSWORD }}
          SQL_HOST: ${{ secrets.SQL_HOST || 'db' }}
          SQL_PORT: ${{ secrets.SQL_PORT || '5432' }}
        run: |
          # Pull de las nuevas imagenes construidas
          docker compose pull
          # Reinicio de servicios
          docker compose up -d
          # Limpieza de imagenes antiguas para ahorrar espacio
          docker image prune -f

name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:latest
          build-args: |
            REACT_APP_API_SERVER=${{ secrets.REACT_APP_API_SERVER }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install Docker Compose Plugin
        run: |
          mkdir -p ~/.docker/cli-plugins/
          if [ ! -f ~/.docker/cli-plugins/docker-compose ]; then
            curl -SL https://github.com/docker/compose/releases/download/v2.26.1/docker-compose-linux-x86_64 -o ~/.docker/cli-plugins/docker-compose
            chmod +x ~/.docker/cli-plugins/docker-compose
          fi
      
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Sync Config to Host Volume
        run: |
          # Crear un volumen en el host para la configuracion
          docker volume create craftech_proxy_config
          
          # Copiar archivos desde el sistema de archivos del runner al volumen del host
          # Esto garantiza que el Docker del host tenga acceso a los archivos .conf y templates
          docker run --rm -v craftech_proxy_config:/target -v $(pwd)/reverse-proxy:/source alpine cp -rf /source/. /target/

      - name: Pull and Restart Services
        env:
          NGINX_FQDN: ${{ secrets.NGINX_FQDN }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          # Usamos un override temporal para que el compose use el volumen en lugar de rutas relativas
          # Esto evita modificar el docker-compose.yml original
          cat <<EOF > docker-compose.override.yml
          services:
            nginx-proxy:
              volumes:
                - craftech_proxy_config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
                - craftech_proxy_config/templates:/etc/nginx/templates:ro
                - craftech_proxy_config/certs:/etc/nginx/certs:ro
                - craftech_proxy_config/logs:/var/log/nginx
          EOF

          docker compose -f docker-compose.yml -f docker-compose.override.yml pull
          docker compose -f docker-compose.yml -f docker-compose.override.yml up -d
          
          docker image prune -f
          rm docker-compose.override.yml

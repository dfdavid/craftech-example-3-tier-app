name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/frontend:latest
          build-args: |
            REACT_APP_API_SERVER=${{ secrets.REACT_APP_API_SERVER }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install Docker Compose Plugin
        run: |
          mkdir -p ~/.docker/cli-plugins/
          if [ ! -f ~/.docker/cli-plugins/docker-compose ]; then
            curl -SL https://github.com/docker/compose/releases/download/v2.26.1/docker-compose-linux-x86_64 -o ~/.docker/cli-plugins/docker-compose
            chmod +x ~/.docker/cli-plugins/docker-compose
          fi
      
      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build Temporary Proxy Config Image
        run: |
          # Construimos la imagen local con la configuracion real
          docker build -t proxy-local:latest -f - . <<EOF
          FROM nginx:stable-alpine
          COPY ./reverse-proxy/nginx/nginx.conf /etc/nginx/nginx.conf
          COPY ./reverse-proxy/templates /etc/nginx/templates
          COPY ./reverse-proxy/certs /etc/nginx/certs
          EOF

      - name: Pull and Restart Services
        env:
          NGINX_FQDN: ${{ secrets.NGINX_FQDN }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        run: |
          # 1. Pull solo del compose original (descarga imagenes remotas de GHCR/DockerHub)
          # Aqui se descargan Backend, Frontend y DB. Nginx-proxy bajara la imagen base oficial.
          docker compose -f docker-compose.yml pull

          # 2. Generar override para usar la imagen local de configuracion
          cat <<EOF > docker-compose.override.yml
          services:
            nginx-proxy:
              image: proxy-local:latest
              volumes: []
          EOF

          # 3. Levantar servicios combinando el original y el override
          docker compose -f docker-compose.yml -f docker-compose.override.yml up -d
          
          # 4. Limpieza
          docker image prune -f
          rm docker-compose.override.yml
